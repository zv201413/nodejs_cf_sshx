# ===== 基础配置 =====
# UUID: 代理用户标识，留空自动生成随机 UUID
UUID=

# ===== 代理协议端口（至少填写一个） =====
# Hysteria2
HY2_PORT=25565

# TUIC
# TUIC_PORT=25565

# Reality
# REALITY_PORT=25565

# Socks5
# S5_PORT=25565

# AnyTLS
# ANYTLS_PORT=25565

# ===== Cloudflare Argo 隧道（可选） =====
# ARGO_AUTH=你的隧道Token
# ARGO_DOMAIN=你的域名
# ARGO_PORT=8001

# ===== 哪吒监控（可选） =====
# NEZHA_SERVER=nz.example.com:8008
# NEZHA_KEY=你的密钥

# ===== SSHX 网页终端 =====
ENABLE_SSHX=true

# ===== 其他配置 =====
# PORT=3000
# NAME=你的节点名称

# ====== install= 参数配置 (可在启动命令中使用，也可在下方填写) ======
# 示例启动命令: node index.js install=paper-name="JP" paper-argo="vless-ws" paper-tuic-port="25575" paper-sshx="true" gist-sshx-file="sshx_JP.txt" gist-sub-file="sub_JP.txt"

# paper-name: 节点名称前缀 (例如: JP, US, CN)
# paper-argo: Argo隧道协议类型 (vmess-ws 或 vless-ws)
# paper-tuic-port: TUIC端口 (会覆盖TUIC_PORT)
# paper-hy2-port: Hysteria2端口 (会覆盖HY2_PORT)
# paper-reality-port: Reality端口 (会覆盖REALITY_PORT)
# paper-sshx: SSHX启用 (true/false，不设置则使用ENABLE_SSHX)
# gist-sshx-file: Gist SSHX文件名 (默认: sshx.txt)
# gist-sub-file: Gist订阅文件名 (默认: sub.txt)
# warp-mode: WARP出站模式 (warp/direct/留空=自动)
