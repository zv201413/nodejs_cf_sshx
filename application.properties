# ===== 基础配置 =====
# UUID: 代理用户标识，留空自动生成随机 UUID
UUID=

# ===== 代理协议端口（至少填写一个） =====
# Hysteria2
HY2_PORT=25565

# TUIC
# TUIC_PORT=25565

# Reality
# REALITY_PORT=25565

# Socks5
# S5_PORT=25565

# AnyTLS
# ANYTLS_PORT=25565

# ===== Cloudflare Argo 隧道（可选） =====
# ARGO_AUTH=你的隧道Token
# ARGO_DOMAIN=你的域名
# ARGO_PORT=8001

# ===== 哪吒监控（可选） =====
# NEZHA_SERVER=nz.example.com:8008
# NEZHA_KEY=你的密钥

# ===== SSHX 网页终端 =====
ENABLE_SSHX=true

# ===== 其他配置 =====
# PORT=3000
# NAME=你的节点名称

# ====== install= 参数配置 (直接粘贴到下方即可，翼龙面板启动时自动读取) ======
# 将下面一行修改为你的配置，去掉前面的 # 号即可生效
# install=paper-name="JP" paper-argo="vless-ws" paper-hy2-port="25565" paper-tuic-port="25575" paper-sshx="true" gist-id="你的GistID" gh-token="你的Token" gist-sshx-file="sshx.txt" gist-sub-file="sub.txt"

# 参数说明：
# paper-name: 节点名称前缀 (例如: JP, US, CN-edu)
# paper-argo: Argo隧道协议类型 (vmess-ws 或 vless-ws)
# paper-argo-ip: Argo优选IP (例如: 104.17.100.191)
# paper-domain: 自定义节点地址IP (例如: 162.43.31.93)
# paper-hy2-port: Hysteria2端口 (会覆盖HY2_PORT)
# paper-tuic-port: TUIC端口 (会覆盖TUIC_PORT)
# paper-reality-port: Reality端口 (会覆盖REALITY_PORT)
# paper-sshx: SSHX启用 (true/false)
# gist-sshx-file: Gist SSHX文件名
# gist-sub-file: Gist订阅文件名
# warp-mode: WARP出站模式 (warp/direct/留空=自动)
# gist-id: Gist ID
# gh-token: GitHub Token
